gpu: "0"
base_model: "google/gemma-2-2b-it"
adapter_path: "experiments/remote_gemma2_2b_phase2"
output_dir: "experiments/remote_gemma2_2b_phase3_rl"

probe_datasets:
  - "data/processed/phase1_passed_only_39k.jsonl"
  - "data/processed/phase1_failed_mixed_20k.jsonl"
  - "data/processed/phase2_with_replay_24k.jsonl"

waf_base_url: "http://localhost:8000"
dvwa_username: "admin"
dvwa_password: "password"

epochs: 150
batch_size: 1
lr: 1.0e-6
max_new_tokens: 256
max_context_length: 1024
max_steps: 3
num_probes: 10
probe_pass_ratio: 0.5
save_every: 5
log_prefix: "train_phase3"
log_suffix: "_gpu0"

use_auth_token_env: "HF_TOKEN"